<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scenario Timer Logger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="clock-bar">
    <div class="clock-stack">
      <span id="liveClock" class="live-clock">00:00 AM</span>
      <span class="clock-location">Chennai, India (IST)</span>
      <span class="clock-offset">Today, +0 hrs</span>
    </div>
  </header>

  <main class="app-shell">

    <section class="panel timer-panel">
      <div class="panel-header">
        <div class="header-left">
          <p class="eyebrow">Active Scenario</p>
          <h1 id="activeScenarioLabel">No scenario selected</h1>
        </div>
        <p id="timerStatus" class="status-pill">Ready</p>
      </div>

      <div class="timer-metrics">
        <div id="timerDisplay" class="timer-display">05:00</div>
        <div class="duration-card">
          <span class="duration-label">Total</span>
          <strong id="totalDurationDisplay">05 mins</strong>
        </div>
      </div>

      <div class="adjust-row" aria-label="Timer adjust controls">
        <button type="button" class="adjust-button" data-adjust="-60">-1m</button>
        <button type="button" class="adjust-button" data-adjust="-10">-10s</button>
        <span class="adjust-label">Timer</span>
        <button type="button" class="adjust-button" data-adjust="10">+10s</button>
        <button type="button" class="adjust-button" data-adjust="60">+1m</button>
      </div>

      <div class="timer-actions">
        <button id="resetTimerBtn" class="secondary-button" type="button">Reset</button>
        <button id="stopSoundBtn" class="secondary-button stop-sound-button hidden" type="button">🔇 Stop Sound</button>
      </div>

      <div class="primary-actions">
        <button id="startBtn" class="primary-button start-button" type="button">Start</button>
        <button id="endBtn" class="primary-button end-button" type="button" disabled>End</button>
      </div>

      <div class="timer-footer">
        <p id="doubleTapHint" class="hint-text">End requires double-tap within 500ms.</p>
        <label class="sound-toggle">
          <input id="soundToggle" type="checkbox" checked>
          <span>Alert sound</span>
        </label>
      </div>
    </section>

    <section class="panel sequence-panel">
      <div class="panel-header compact-header">
        <div>
          <p class="eyebrow">Test Sequence</p>
          <h2>Scenarios</h2>
        </div>
        <button id="addSequenceRowBtn" class="secondary-button" type="button">+ Add Row</button>
      </div>

      <div id="sequenceList" class="sequence-list">
        <p class="hint-text seq-empty-hint">No scenarios. Tap + Add Row to build your sequence.</p>
      </div>

      <p id="sequenceHint" class="hint-text seq-status-hint"></p>
    </section>

    <section class="panel notes-panel">
      <div class="panel-header compact-header">
        <div>
          <p class="eyebrow">Notes</p>
          <h2>Metadata</h2>
        </div>
        <button id="insertTimeBtn" class="secondary-button" type="button">+ Time</button>
      </div>
      <textarea id="notesInput" class="notes-input" placeholder="Room, hardware, tester, anomalies, setup notes..."></textarea>
    </section>

    <section class="panel history-panel">
      <div class="history-header-row">
        <button id="historyToggleBtn" class="history-toggle" type="button" aria-expanded="true">
          <span>Scenario History</span>
          <span id="historyCount" class="badge">0</span>
        </button>
        <div class="history-toolbar">
          <button id="copyLogsBtn" class="secondary-button" type="button">Copy</button>
          <button id="clearLogsBtn" class="secondary-button danger-button" type="button">Clear</button>
        </div>
      </div>
      <p id="copyStatus" class="hint-text">Logs ready.</p>
      <div id="historyBody" class="history-body">
        <div id="logList" class="log-list"></div>
      </div>
    </section>

  </main>

  <div id="toast" class="toast hidden" role="status" aria-live="polite">
    <span id="toastMessage"></span>
    <button id="toastUndoBtn" class="toast-button" type="button">UNDO</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
